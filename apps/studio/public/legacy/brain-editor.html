<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Brain Editor — Saunders Wood Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="icon" type="image/png" href="./favicon.png"/>
<link rel="apple-touch-icon" href="./favicon.png"/>
<link rel="preconnect" href="https://use.typekit.net" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://use.typekit.net/syk8hlp.css"/>
  <style>
    /* ── CSS Variables ─────────────────────────────────────────────────── */
    :root {
      --font-body: degular, "degular-text", system-ui, sans-serif;
      --font-display: "minerva-modern", "Minerva", Georgia, serif;
      --track-tight: 0.02em;
      --track-caps: 0.14em;
      --lh-body: 1.65;
      --lh-heading: 1.08;
      --gold: #C9A44C;
      --gold-light: #e0bc70;
      --green: #2e3a2f;
      --black: #0a0a08;
      --white: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #f4f0e8;
      --bg2: #ede8de;
      --surface: #faf7f2;
      --border: rgba(46,58,47,0.16);
      --text: #1a1c18;
      --text-muted: rgba(26,28,24,0.62);
      --header-bg: #0a0a08;
      --footer-bg: #0a0a08;
    }

    [data-theme="dark"] {
      --bg: #0d0f0b;
      --bg2: #111310;
      --surface: #1e211c;
      --border: rgba(201,164,76,0.15);
      --text: #f0ede6;
      --text-muted: rgba(240,237,230,0.58);
      --header-bg: #000000;
      --footer-bg: #000000;
    }

    html {
      font-size: 112%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      line-height: var(--lh-body);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.2s, color 0.2s;
    }

    /* ── Auth Screen ───────────────────────────────────────────────────── */
    .auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: var(--bg);
      flex-direction: column;
    }

    .auth-screen.hidden {
      display: none;
    }

    .auth-box {
      background: var(--surface);
      padding: 3rem;
      border: 1px solid var(--border);
      text-align: center;
      max-width: 400px;
    }

    .auth-box h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 400;
      letter-spacing: var(--track-tight);
    }

    .auth-box p {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .auth-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
      font-family: var(--font-body);
    }

    .auth-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201,164,76,0.1);
    }

    .auth-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--gold);
      color: var(--text);
      border: 1px solid var(--gold);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }

    .auth-btn:hover {
      background: var(--gold-light);
    }

    /* ── Editor Layout ─────────────────────────────────────────────────── */
    .editor-container {
      display: flex;
      width: 100%;
      height: 100%;
      flex-direction: column;
    }

    .editor-container.hidden {
      display: none;
    }

    /* ── Editor Header ────────────────────────────────────────────────── */
    .editor-header {
      background: var(--header-bg);
      border-bottom: 1px solid rgba(201,164,76,0.18);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }

    .editor-header h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: #ffffff;
      font-weight: 400;
      margin: 0;
      letter-spacing: var(--track-tight);
    }

    .editor-header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .editor-btn {
      padding: 0.5rem 1rem;
      border: 1px solid rgba(201,164,76,0.32);
      background: transparent;
      color: rgba(255,255,255,.6);
      border-radius: 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: var(--track-caps);
      text-transform: uppercase;
      transition: all 0.2s;
      font-family: var(--font-body);
      text-decoration: none;
      display: inline-block;
    }

    .editor-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .editor-btn.danger {
      border-color: #d32f2f;
      color: #d32f2f;
    }

    .editor-btn.danger:hover {
      background: #d32f2f;
      color: white;
    }

    /* ── Editor Body ───────────────────────────────────────────────────── */
    .editor-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .editor-sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 0;
    }

    .sidebar-section {
      padding: 0 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section:last-child {
      border-bottom: none;
      margin-top: auto;
    }

    .sidebar-title {
      font-weight: 600;
      color: var(--text);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: var(--track-caps);
      margin-bottom: 0.75rem;
    }

    .add-file-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--gold);
      color: var(--text);
      border: 1px solid var(--gold);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      margin-bottom: 1rem;
      font-family: var(--font-body);
    }

    .add-file-btn:hover {
      background: var(--gold-light);
    }

    .file-list {
      list-style: none;
    }

    .file-list-item {
      padding: 0.75rem 0.5rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .file-list-item:hover {
      background: var(--bg2);
      color: var(--text);
    }

    .file-list-item.active {
      background: var(--bg2);
      border-left-color: var(--gold);
      color: var(--text);
      font-weight: 600;
    }

    /* ── Editor Pane ───────────────────────────────────────────────────── */
    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .editor-pane-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .editor-pane-header h2 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      color: var(--text);
      font-weight: 400;
      margin: 0 0 0.5rem 0;
      letter-spacing: var(--track-tight);
    }

    .editor-pane-meta {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ── Editor Content ────────────────────────────────────────────────── */
    .editor-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .editor-textarea {
      flex: 1;
      padding: 1.5rem;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 0.9rem;
      border: none;
      resize: none;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    .editor-textarea:focus {
      outline: none;
    }

    .editor-preview {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      font-size: 0.95rem;
      line-height: var(--lh-body);
      display: none;
    }

    .editor-preview.active {
      display: block;
    }

    .editor-preview h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin: 1.5rem 0 0.75rem 0;
      color: var(--text);
      font-weight: 400;
    }

    .editor-preview h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin: 1.5rem 0 0.75rem 0;
      color: var(--text);
      font-weight: 400;
    }

    .editor-preview h3 {
      font-size: 1.1rem;
      margin: 1rem 0 0.5rem 0;
      color: var(--text);
      font-weight: 600;
    }

    .editor-preview p {
      margin-bottom: 0.75rem;
    }

    .editor-preview code {
      background: var(--border);
      padding: 0.2rem 0.4rem;
      font-family: 'Monaco', monospace;
      font-size: 0.9em;
    }

    .editor-preview strong {
      font-weight: 700;
    }

    /* ── Editor Footer ────────────────────────────────────────────────── */
    .editor-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }

    .footer-status {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .footer-status.unsaved {
      color: #d32f2f;
      font-weight: 600;
    }

    .footer-actions {
      display: flex;
      gap: 0.75rem;
    }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 820px) {
      .editor-sidebar {
        width: 240px;
      }

      .editor-preview {
        display: none !important;
      }

      .editor-textarea {
        font-size: 16px;
      }
    }

    @media (max-width: 600px) {
      html {
        font-size: 100%;
      }

      .editor-header {
        padding: 0.75rem 1rem;
        height: auto;
      }

      .editor-header-actions {
        gap: 0.5rem;
      }

      .editor-btn {
        font-size: 0.75rem;
        padding: 0.4rem 0.75rem;
      }

      .editor-sidebar {
        width: 200px;
      }
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-box">
      <h1>Agent Brain</h1>
      <p>Editor Access</p>
      <input type="password" class="auth-input" id="passwordInput" placeholder="Enter password" />
      <button class="auth-btn" onclick="authenticate()">Unlock</button>
    </div>
  </div>

  <!-- Editor Container -->
  <div class="editor-container hidden" id="editorContainer">
    <!-- Header -->
    <div class="editor-header">
      <h1>Agent Brain Editor</h1>
      <div class="editor-header-actions">
        <a href="brain.html" class="editor-btn">← Back to Brain</a>
        <button class="editor-btn danger" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="editor-body">
      <!-- Sidebar -->
      <div class="editor-sidebar">
        <div class="sidebar-section">
          <button class="add-file-btn" onclick="createNewFile()">+ New File</button>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title">Training Files</div>
          <ul class="file-list" id="fileList"></ul>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title">Tips</div>
          <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;">
            • Save with Ctrl+S<br>
            • Markdown formatting supported<br>
            • Preview updates live
          </p>
        </div>
      </div>

      <!-- Editor Pane -->
      <div class="editor-pane">
        <div class="editor-pane-header">
          <h2 id="currentFileName">Select a file to edit</h2>
          <div class="editor-pane-meta" id="currentFileMeta"></div>
        </div>

        <div class="editor-content">
          <textarea class="editor-textarea" id="editorTextarea" placeholder="Select a file to edit..."></textarea>
          <div class="editor-preview" id="editorPreview"></div>
        </div>

        <div class="editor-footer">
          <div class="footer-status" id="footerStatus">Ready</div>
          <div class="footer-actions">
            <button class="editor-btn" onclick="togglePreview()">Toggle Preview</button>
            <button class="editor-btn" onclick="saveCurrentFile()">Save Changes</button>
            <button class="editor-btn danger" onclick="deleteCurrentFile()">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Shared header (for theme toggle) -->
  <script src="./shared-header.js"></script>

  <script>
    let brainData = null;
    let currentFileId = null;
    let fileContents = {};
    let hasUnsavedChanges = false;
    const CORRECT_PASSWORD = 'saunders';

    // ── Initialize ────────────────────────────────────────────────────
    async function initialize() {
      const authToken = localStorage.getItem('brainEditorAuth');

      if (!authToken) {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('editorContainer').classList.add('hidden');
      } else {
        unlockEditor();
      }

      // Load brain data
      try {
        const response = await fetch('brain/brain-index.json');
        if (!response.ok) throw new Error('Failed to load brain-index.json');
        brainData = await response.json();

        // Load all file contents
        for (const file of brainData.files) {
          try {
            const fileResponse = await fetch(`brain/${file.path}`);
            if (!fileResponse.ok) throw new Error(`Failed to load ${file.path}`);
            fileContents[file.id] = await fileResponse.text();
          } catch (error) {
            console.error(`Error loading ${file.path}:`, error);
            fileContents[file.id] = `# ${file.name}\n\n[Error loading content]`;
          }
        }

        renderFileList();
      } catch (error) {
        console.error('Failed to load brain data:', error);
        alert('Error loading training files: ' + error.message);
      }
    }

    // ── Authentication ────────────────────────────────────────────────
    function authenticate() {
      const password = document.getElementById('passwordInput').value;

      if (password === CORRECT_PASSWORD) {
        localStorage.setItem('brainEditorAuth', 'true');
        unlockEditor();
      } else {
        alert('Incorrect password');
        document.getElementById('passwordInput').value = '';
      }
    }

    function unlockEditor() {
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('editorContainer').classList.remove('hidden');
      document.getElementById('passwordInput').value = '';
    }

    function logout() {
      if (hasUnsavedChanges) {
        if (!confirm('You have unsaved changes. Are you sure?')) {
          return;
        }
      }

      localStorage.removeItem('brainEditorAuth');
      location.reload();
    }

    // ── File List ────────────────────────────────────────────────────
    function renderFileList() {
      const list = document.getElementById('fileList');
      list.innerHTML = '';

      brainData.files.forEach(file => {
        const item = document.createElement('li');
        item.className = 'file-list-item';
        item.textContent = file.name;
        item.onclick = () => selectFile(file.id);
        list.appendChild(item);
      });
    }

    // ── File Selection ────────────────────────────────────────────────
    function selectFile(fileId) {
      if (hasUnsavedChanges) {
        if (!confirm('Discard unsaved changes?')) {
          return;
        }
      }

      const file = brainData.files.find(f => f.id === fileId);
      currentFileId = fileId;

      // Update sidebar highlight
      document.querySelectorAll('.file-list-item').forEach(item => {
        item.classList.remove('active');
      });
      event.target.classList.add('active');

      // Update editor
      document.getElementById('editorTextarea').value = fileContents[fileId];
      document.getElementById('currentFileName').textContent = file.name;

      const categoryObj = brainData.categories.find(c => c.id === file.category);
      document.getElementById('currentFileMeta').innerHTML = `
        <div>📁 ${categoryObj ? categoryObj.name : file.category}</div>
        <div>📝 ${file.wordCount || 0} words</div>
        <div>🕐 ${new Date(file.lastUpdated).toLocaleDateString()}</div>
      `;

      updatePreview();
      hasUnsavedChanges = false;
      updateFooterStatus();
    }

    // ── Create New File ──────────────────────────────────────────────
    function createNewFile() {
      const fileName = prompt('Enter new file name (without .md):');
      if (!fileName) return;

      const newId = fileName.toLowerCase().replace(/\s+/g, '-');
      const newFile = {
        id: newId,
        name: fileName,
        path: `${newId}.md`,
        category: 'reference',
        description: 'New training document',
        relatedFiles: [],
        importance: 1,
        lastUpdated: new Date().toISOString().split('T')[0],
        wordCount: 0
      };

      brainData.files.push(newFile);
      fileContents[newId] = `# ${fileName}\n\nAdd your content here...`;

      renderFileList();
      selectFile(newId);

      alert('New file created. Click Save to persist.');
    }

    // ── Save File ────────────────────────────────────────────────────
    function saveCurrentFile() {
      if (!currentFileId) return;

      const newContent = document.getElementById('editorTextarea').value;
      fileContents[currentFileId] = newContent;

      // Update metadata
      const wordCount = newContent.split(/\s+/).filter(w => w.length > 0).length;
      const file = brainData.files.find(f => f.id === currentFileId);
      file.wordCount = wordCount;
      file.lastUpdated = new Date().toISOString().split('T')[0];

      hasUnsavedChanges = false;
      updateFooterStatus();

      // Show feedback
      const status = document.getElementById('footerStatus');
      status.textContent = '✓ Saved';
      setTimeout(() => updateFooterStatus(), 2000);

      // TODO: Send to server
      console.log(`Saved: ${file.name}`);
    }

    // ── Delete File ──────────────────────────────────────────────────
    function deleteCurrentFile() {
      if (!currentFileId) return;

      const file = brainData.files.find(f => f.id === currentFileId);
      if (confirm(`Delete "${file.name}"? This cannot be undone.`)) {
        brainData.files = brainData.files.filter(f => f.id !== currentFileId);
        delete fileContents[currentFileId];

        currentFileId = null;
        document.getElementById('editorTextarea').value = '';
        document.getElementById('currentFileName').textContent = 'Select a file to edit';
        document.getElementById('currentFileMeta').innerHTML = '';

        renderFileList();

        // TODO: Send to server
        console.log(`Deleted: ${file.name}`);
      }
    }

    // ── Preview ──────────────────────────────────────────────────────
    function updatePreview() {
      const textarea = document.getElementById('editorTextarea');
      const preview = document.getElementById('editorPreview');

      // Simple markdown rendering
      let html = textarea.value;

      // Headings
      html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

      // Bold and italic
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

      // Line breaks
      html = html.replace(/\n\n/g, '</p><p>');
      html = '<p>' + html + '</p>';

      preview.innerHTML = html;
    }

    function togglePreview() {
      const preview = document.getElementById('editorPreview');
      preview.classList.toggle('active');
    }

    // ── Status Management ────────────────────────────────────────────
    function updateFooterStatus() {
      const status = document.getElementById('footerStatus');

      if (hasUnsavedChanges) {
        status.textContent = '⚠ Unsaved changes';
        status.classList.add('unsaved');
      } else {
        status.textContent = 'Ready';
        status.classList.remove('unsaved');
      }
    }

    // ── Keyboard Shortcuts ───────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveCurrentFile();
      }
    });

    // ── Track Changes ────────────────────────────────────────────────
    document.addEventListener('input', (e) => {
      if (e.target.id === 'editorTextarea') {
        hasUnsavedChanges = true;
        updateFooterStatus();
        updatePreview();
      }
    });

    // ── Warn Before Leave ────────────────────────────────────────────
    window.addEventListener('beforeunload', (e) => {
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // ── Initialize on Load ───────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
